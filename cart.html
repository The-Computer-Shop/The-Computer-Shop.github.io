<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart - The Computer Shop</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="navbar">
  <div class="nav-left">
    <a href="index.html" class="site-title">The Computer Shop</a>
    <a href="signature-builds.html" class="nav-link">Signature Builds</a>
    <a href="index.html#contact" class="nav-link">Contact Us</a>
  </div>

  <div class="nav-right">
    <a href="cart.html" class="nav-cart-link" aria-label="Cart">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <circle cx="9" cy="19" r="1.6" fill="currentColor" stroke="none"></circle>
    <circle cx="17" cy="19" r="1.6" fill="currentColor" stroke="none"></circle>
    <path d="M4 5h2l2.1 8.2h8.3l2.2-6.2H7.2"></path>
    <path d="M8.3 13.2h8.1"></path>
  </svg>
</a>
  </div>
</header>

  <main class="cart-page">
    <section class="cart-layout">
      <div class="cart-header">
        <h1>Your Cart</h1>
      </div>

      <div id="cart-items" class="cart-items"></div>

      <div id="cart-empty" class="cart-empty">
        Your cart is empty.
      </div>

      <div id="cart-summary" class="cart-summary">
        <div class="cart-summary-row">
          <span>Total</span>
          <strong id="cart-total">0 EGP</strong>
        </div>

        <button class="cart-checkout-button" type="button">
          Checkout
        </button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
