<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signature Build - The Computer Shop</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="navbar">
    <div class="nav-left">
      <a href="index.html" class="site-title">The Computer Shop</a>
<a href="signature-builds.html" class="nav-link">Signature Builds</a>

<div class="nav-dropdown">
  <a href="#" class="nav-link nav-dropdown-toggle">Components</a>
  <div class="nav-dropdown-menu">
    <a href="#" class="nav-dropdown-item">Processor</a>
    <a href="#" class="nav-dropdown-item">CPU Cooler</a>
    <a href="#" class="nav-dropdown-item">Motherboard</a>
    <a href="#" class="nav-dropdown-item">Memory</a>
    <a href="#" class="nav-dropdown-item">Storage</a>
    <a href="#" class="nav-dropdown-item">Graphics Card</a>
    <a href="#" class="nav-dropdown-item">Case</a>
    <a href="#" class="nav-dropdown-item">Power Supply</a>
    <a href="#" class="nav-dropdown-item">Monitor</a>
  </div>
</div>

<a href="index.html#contact" class="nav-link">Contact Us</a>
    </div>

    <div class="nav-right">
      <a href="cart.html" class="nav-cart-link" aria-label="Cart">
        <img src="cart-icon.png" alt="Cart">
        <span class="nav-cart-count">0</span>
      </a>
    </div>
  </header>

  <main class="build-detail-page">
    <section class="build-detail-layout">
      <section class="featured-builds">
        <h1 class="build-detail-heading" id="build-title">Signature Build</h1>

        <div class="featured-carousel manual-carousel">
          <div class="featured-carousel-window">
            <div class="featured-carousel-track" id="build-carousel-track"></div>

            <button class="carousel-arrow carousel-arrow-left" aria-label="Previous photo">&#10094;</button>
            <button class="carousel-arrow carousel-arrow-right" aria-label="Next photo">&#10095;</button>
          </div>

          <div class="carousel-thumbnails" id="build-thumbnails"></div>
        </div>
      </section>

      <aside class="build-specs-panel">
        <h2 class="build-section-heading">Specifications</h2>
        <div class="build-price" id="build-price"></div>
        <div class="build-specs-list" id="build-specs-list"></div>

        <div class="purchase-actions">
          <div class="purchase-top-row">
            <div class="quantity-control">
              <button class="quantity-button quantity-minus" type="button" aria-label="Decrease quantity">−</button>
              <input class="quantity-value" type="number" min="1" value="1" inputmode="numeric" aria-label="Quantity">
              <button class="quantity-button quantity-plus" type="button" aria-label="Increase quantity">+</button>
            </div>

            <button
              class="add-to-cart-button"
              id="build-add-to-cart"
              type="button"
              data-id=""
              data-name=""
              data-price=""
              data-image=""
              data-url=""
            >
              Add to Cart
            </button>
          </div>

          <button class="buy-now-button" type="button">
            Buy Now
          </button>
        </div>
      </aside>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
